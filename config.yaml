Profile 页

如果时间再紧一点，可以压缩成 7 页：
身份选择、Explore、社团主页、匹配问答、匹配结果、社团管理台、Profile。

十、你画原型时最应该注意的一个结构原则

公共内容一定要统一，不要拆成“两套首页”。
否则用户会很难理解平台结构，也会让作品显得臃肿。