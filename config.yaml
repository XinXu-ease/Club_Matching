如果你时间有限，真正要画出来的重点页其实只需要 8 到 10 页：
欢迎/身份选择、Explore、社团主页、活动详情/招新详情、智能匹配问答、匹配结果、社团管理台、编辑主页、发布公告、Profile。

三、一级页面详细信息框架

下面我按页面讲每个页面要放什么，以及从哪里来、到哪里去。

欢迎页 / 首次进入弹窗

这是首次进入时出现的页面或弹窗。

目标：
让用户理解平台有两种使用身份。

页面内容：
顶部平台名与一句话说明。
中间两个大入口卡片：
“我是新生，想找合适的社团”
“我是社团负责人，想发布招新信息”
底部是“先随便逛逛”按钮。

按钮逻辑：
点击“新生” -> 登录/注册后进入 Explore，并默认身份为新生
点击“社团负责人” -> 登录/注册后进入身份认证页或社团身份入口页
点击“随便逛逛” -> 以游客身份进入 Explore

补充：
这个页面只在首次进入时强提示，后续可从 Profile 里切换身份。

Explore 首页

这是平台最重要的公共流量入口。

核心目标：
让用户快速发现社团、活动和招新内容，并引导进入详情页、社团主页、匹配页。

页面结构建议：

顶部区域：
搜索框
筛选按钮
身份切换提示或当前身份标识

首屏 banner：
“还不知道加入哪个社团？去做匹配测试”
按钮跳转到 Match 页

内容分区：
热门社团
近期公开活动
正在招新
你可能感兴趣（登录后可显示）
推荐分类标签，比如学术、艺术、体育、公益、职业发展等

每个卡片的信息建议：

社团卡片
社团 logo
社团名
一句话定位
标签：门槛、投入、适合人群
关注/收藏按钮
点击卡片进入社团主页

活动卡片
活动封面
活动标题
举办社团
时间地点
活动类型标签
点击进入活动详情页

招新公告卡片
封面或海报
社团名
公告标题
报名截止时间
招新部门/方向
点击进入招新公告详情页

Explore 页主要跳转逻辑：
点击搜索框 -> 搜索结果页
点击分类标签 -> 分类/筛选结果页
点击社团卡 -> 社团主页
点击活动卡 -> 活动详情页
点击招新公告卡 -> 招新公告详情页
点击 banner -> 匹配引导页
点击收藏 -> 未登录则跳登录，已登录则收藏成功

搜索结果页 / 分类筛选页

这两个页面可以做成同一个逻辑，只是入口不同。

页面内容：
顶部搜索框
筛选项：社团类型、时间投入、门槛、活动频率、适合人群、是否正在招新
结果列表可切换为“社团 / 活动 / 招新”

跳转逻辑：
点社团 -> 社团主页
点活动 -> 活动详情
点公告 -> 招新公告详情
点重新筛选 -> 打开筛选抽屉

社团主页

这是整个平台最关键的详情页之一。它既是新生判断是否适合的主要页面，也是社团端要重点维护的页面。

页面结构建议：

顶部：
logo、社团名、认证状态
一句话定位
收藏按钮
分享按钮

基础信息区：
成立时间
规模
组织架构 / 下属部门
常规活动时间
加入门槛
时间投入
主要收获
适合人群

详细介绍区：
社团概况
日常活动展示
图片/往期活动

内容 tab 区：
Tab1 主页概览
Tab2 招新公告
Tab3 活动
Tab4 FAQ / 留言

底部固定操作区：
提问
报名/申请
加入官方群入口（如果开放）
查看匹配度（登录用户可见，可跳到匹配页或显示“与你的画像匹配度高”）

新生视角下的关键动作：
收藏社团
去报名
去提问
查看招新公告
查看活动
从社团主页再去做匹配或比较

社团端视角下，如果当前用户有管理权限：
右上角显示“编辑”按钮
点击进入“编辑社团主页”

跳转逻辑：
点击某条招新公告 -> 招新公告详情页
点击某个活动 -> 活动详情页
点击“提问” -> 对应社团问答详情页
点击“报名” -> 报名/申请页
点击“编辑” -> 编辑社团主页
点击某个部门标签 -> 可跳到该部门介绍弹层或页内展开

活动详情页

目标：
承接 Explore 中的活动内容，让用户了解活动并决定是否参加。

页面内容：
活动封面
标题
主办社团
时间地点
活动介绍
适合人群
参与方式
相关图片
评论/留言入口
底部按钮：报名参加 / 收藏 / 查看主办社团

跳转逻辑：
点击主办社团 -> 社团主页
点击报名参加 -> 报名页或外链表单
点击留言 -> 对应活动问答区
点击收藏 -> 收藏成功
从活动详情也可以回流到社团主页

招新公告详情页

这个页面和活动详情页相似，但重点是招新和申请。

页面内容：
招新标题
所属社团
发布时间
招新部门
招募要求
时间安排
报名截止日期
招新流程说明
联系方式
海报图
底部按钮：立即报名 / 收藏 / 去社团主页 / 提问

跳转逻辑：
点击“立即报名” -> 报名/申请页
点击“去社团主页” -> 社团主页
点击“提问” -> 对应社团问答详情页

报名/申请页

这是转化页。

页面内容建议：
申请的对象是什么：某社团 / 某活动 / 某部门
表单区：
姓名/昵称
院系/年级
联系方式
个人兴趣
为什么想加入
时间可投入情况
过往经验（可选）
附件上传（可选）

提交成功后：
显示“已提交”
推荐下一步：
返回社团主页
查看我的报名
继续浏览其他社团

跳转逻辑：
提交 -> 成功页或弹窗
成功后 -> 我的报名 / 社团主页 / Explore

四、新生端核心层

Match 引导页

这个页面很重要，用来把“智能匹配”讲清楚。

页面内容：
标题：找到更适合你的社团
说明：通过兴趣、时间安排和参与偏好，为你推荐更适合的社团和岗位/部门
按钮：开始匹配

可在下方展示一些示例标签：
兴趣方向、投入偏好、社交风格、技能发展目标

跳转逻辑：
点击开始 -> 匹配问答页

匹配问答页

这一页建议做成分步问答，不要一屏太长。

信息结构建议分 4 组：

第一组：兴趣方向
艺术、运动、公益、学术、媒体、职业发展、技术、文娱等

第二组：参与目标
拓展朋友、培养兴趣、积累简历、提升技能、寻找归属感、打比赛等

第三组：时间与投入偏好
每周愿意投入时间
是否能接受固定例会
是否接受高频活动
是否希望低压力参与

第四组：个人偏好
更喜欢大组织还是小圈子
更喜欢公开活动还是核心运营
偏向表达/策划/执行/设计/技术/外联等

底部：
进度条
上一步 / 下一步
提交按钮

跳转逻辑：
完成后 -> 匹配结果页
中途退出 -> 可保存草稿到 Profile

匹配结果页

这是新生端的核心展示页。

页面内容：
顶部是用户画像摘要：
你的偏好：低门槛 / 中等投入 / 偏兴趣探索 / 喜欢合作型活动

下面是推荐社团列表，每张卡片包含：
社团名
匹配度百分比或等级
推荐理由
关键标签
按钮：查看主页 / 收藏 / 报名 / 比较

推荐理由建议固定成 1 到 2 句：
“推荐原因：你偏好中低投入、氛围友好、表达型活动，因此文学社和广播站更适合你当前阶段。”

可以再设一个板块：
推荐你关注的部门
例如宣传部、策划部、活动部

跳转逻辑：
点查看主页 -> 社团主页
点收藏 -> 加入收藏
点报名 -> 报名页
点比较 -> 进入社团比较页（可选，不一定要做）
点重新匹配 -> 回匹配问答页

我的报名 / 收藏 / 浏览记录 / 提问记录

这几个可以分成 Profile 内部 tab，不一定要独立做很多页。

建议 Profile 下做这四个 tab：
我的收藏
我的报名
浏览记录
提问记录

这样就不用单独做太多页面。

五、社团端核心层

社团管理台首页

这是社团端的“第二个 tab”，替代新生端的 Match。

页面结构建议：
顶部显示当前管理的社团名和身份状态
中间是几个数据卡片：
主页访问量
收藏量
被匹配次数
报名人数
待回复留言数

下面是快捷入口：
编辑社团主页
发布招新公告
发布活动
查看报名表
查看留言

这页的目标是让社团负责人一眼看到最重要的信息。

跳转逻辑：
点数据卡 -> 对应详情页
点编辑主页 -> 编辑社团主页
点发布公告 -> 发布招新公告页
点查看报名 -> 报名表管理页
点留言 -> FAQ/留言管理页

编辑社团主页

页面内容：
基础信息编辑：
logo、社团名、一句话定位、成立时间、规模

标签信息编辑：
时间投入
加入门槛
主要收获
适合人群
活动频率
组织风格

详细介绍编辑：
社团概况
组织架构
日常活动
官方渠道
联系人信息（可选）
FAQ 设置

按钮：
保存
预览
发布更新

跳转逻辑：
保存 -> 返回管理台或留在当前页
预览 -> 打开社团主页预览态
发布 -> 更新对外展示内容

发布招新公告页

页面内容：
标题
封面图/海报
招新部门
要求说明
时间安排
报名截止时间
报名方式（站内表单 / 外链表单）
联系方式

按钮：
预览
发布

跳转逻辑：
发布后 -> 公告详情页 / 公告管理列表
预览 -> 预览模式

发布活动页

和发布招新公告逻辑相似。
区别在于字段偏活动：
活动时间
地点
人数限制
报名方式
活动说明

公告管理列表

页面内容：
按 tab 分：
招新公告
活动公告

列表支持：
按时间排序
按状态筛选：草稿 / 已发布 / 已结束
每条有编辑、删除、查看详情

跳转逻辑：
点击某条 -> 详情页
点击编辑 -> 编辑对应公告
点击新建 -> 发布页

报名表管理页

页面内容：
按活动 / 按招新岗位筛选
表格展示报名人信息
支持搜索
支持下载

跳转逻辑：
点击某个报名人 -> 报名详情
点击下载 -> 导出文件

数据统计页

页面内容建议：
核心指标：
主页访问量
匹配触达量
收藏量
提问量
报名提交量
转化率

图表不必复杂，简单折线或柱状即可。
如果你不想画复杂图表，就做成数字卡片 + 趋势箭头。

FAQ / 留言管理页

页面内容：
FAQ 预设问题列表
用户留言列表
状态筛选：待回复 / 已回复
每条可以回复、置顶、删除

跳转逻辑：
点击留言 -> 回复详情
点击 FAQ -> 编辑常见问题

六、Messages 页面设计

这个页面建议统一做成“消息 / 问答中心”，不要真做复杂即时聊天。

对于新生端：
显示我问过哪些社团、哪些活动，是否收到回复。
可按“未回复 / 已回复”筛选。

对于社团端：
显示来自哪些社团主页、活动页、招新公告页的咨询问题。
可按“待处理 / 已回复”筛选。

页面内容结构：
对话列表区
右侧详情区，或移动端进入详情页

每条消息显示：
对象名
最近一条消息
时间
状态

跳转逻辑：
点击某条 -> 某社团问答详情页
在问答详情里可继续留言

七、Profile 页面设计

新生端 Profile：
头像、昵称、个性签名
我的标签画像
收藏
报名
浏览记录
提问记录
设置与反馈
身份申请入口：申请成为社团管理员

社团端 Profile：
头像、昵称
当前管理身份：某某社团管理员
认证状态
我发布的公告
我管理的留言
报名表下载入口
身份切换
设置与反馈

八、核心跳转逻辑总图

下面我按“用户路径”给你串一下，这个最适合你后面画 flow。

新生主路径

首次进入
-> 欢迎页选择“我是新生”
-> 登录/注册
-> Explore 首页
-> 浏览社团 / 活动 / 招新内容
-> 点进社团主页
-> 判断感兴趣
-> 去匹配页做测试
-> 查看匹配结果
-> 再回到更匹配的社团主页
-> 提问或直接报名
-> 提交报名
-> 在 Profile 查看报名记录

新生另一条快路径

首次进入
-> Explore 首页
-> 首屏 banner 点“开始匹配”
-> 匹配问答
-> 匹配结果
-> 某个社团主页
-> 收藏 / 报名 / 提问

社团端主路径

首次进入
-> 欢迎页选择“我是社团负责人”
-> 登录/注册
-> 提交身份认证
-> 审核通过
-> 进入社团管理台
-> 编辑社团主页
-> 发布招新公告
-> 在 Explore 被用户看到
-> 用户点击进入详情与主页
-> 用户留言/报名
-> 社团端在 Messages 和 报名管理中处理

公共内容流转路径

Explore 首页
-> 招新公告详情页
-> 社团主页
-> 报名页

Explore 首页
-> 活动详情页
-> 主办社团主页

匹配结果页
-> 社团主页
-> 留言或报名

九、最推荐你实际做出来的页面组合

如果你这次是做测评，我建议你最终展示 9 个核心页面就够了：

欢迎/身份选择页
Explore 首页
社团主页
招新公告详情页
活动详情页
匹配问答页
匹配结果页
