A5. 社团身份认证申请页
A6. 认证审核中 / 审核结果页

B. 公共浏览层
B1. Explore 首页
B2. 搜索结果页
B3. 社团分类/筛选结果页
B4. 社团主页
B5. 活动详情页
B6. 招新公告详情页
B7. 报名/申请页

C. 新生端核心层
C1. 智能匹配引导页
C2. 匹配问答页
C3. 匹配结果页
C4. 匹配详情页（推荐解释，可选）
C5. 我的报名
C6. 我的收藏
C7. 浏览记录
C8. 我的提问/留言记录

D. 社团端核心层
D1. 社团管理台首页
D2. 编辑社团主页
