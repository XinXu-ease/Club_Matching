<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClubMatch — 选择身份</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark:#264653; --teal:#2A9D8F; --gold:#E9C46A;
      --peach:#F4A261; --coral:#E76F51; --white:#FFFFFF; 
      --off:#FAFAF8;  --text:#1A2E35;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f0f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    /* 手机外壳 */
    .phone-frame {
      width: 375px;
      height: 812px;
      background: #000;
      border-radius: 60px;
      padding: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    
    /* 手机屏幕内容区 */
    .screen {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #264653 0%, #2A9D8F 100%);
      border-radius: 50px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    /* 主容器 */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 40px 30px;
      text-align: center;
    }
    
    .logo {
      font-size: 60px;
      margin-bottom: 16px;
    }
    
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    
    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 36px;
    }
    
    .role-selector {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin-bottom: 20px;
    }
    
    .role-btn {
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 56px;
    }
    
    .role-btn:hover {
      transform: scale(1.02);
      opacity: 0.9;
    }
    
    .role-btn:active {
      transform: scale(0.98);
    }
    
    .student-btn {
      background: linear-gradient(135deg, #F4A261, #E76F51);
      color: white;
    }
    
    .manager-btn {
      background: linear-gradient(135deg, #1B6A5A, #0d4a3d);
      color: white;
    }
    
    .emoji {
      font-size: 24px;
    }
    
    .footer {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-top: auto;
    }
  </style>
</head>
<body>
  <!-- 手机外壳 -->
  <div class="phone-frame">
    <div class="screen">
      <!-- 主内容 -->
      <div class="container">
        <div class="logo">🎓</div>
        <h1>ClubMatch</h1>
        <p class="subtitle">选择你的身份开始</p>
        
        <div class="role-selector">
          <button class="role-btn student-btn" onclick="window.location.href='clubmatch-student.html'">
            <span class="emoji">🎓</span>
            <span>我是学生 / 新生</span>
          </button>
          <button class="role-btn manager-btn" onclick="window.location.href='clubmatch-manager.html'">
            <span class="emoji">🏛️</span>
            <span>我是社团管理员</span>
          </button>
        </div>
        
        <p class="footer">你可以随时在个人资料中切换身份</p>
      </div>
    </div>
  </div>
</body>
</html>
