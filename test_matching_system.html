<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>匹配系统测试</title>
<style>
body {
  font-family: Arial, sans-serif;
  max-width: 800px;
  margin: 50px auto;
  padding: 20px;
  background: #f5f5f5;
}
.test-result {
  margin: 10px 0;
  padding: 10px;
  border-radius: 4px;
  border-left: 4px solid #ccc;
}
.pass {
  background: #e8f5e9;
  border-left-color: #4caf50;
}
.fail {
  background: #ffebee;
  border-left-color: #f44336;
}
.info {
  background: #e3f2fd;
  border-left-color: #2196f3;
}
pre {
  background: white;
  padding: 10px;
  border-radius: 4px;
  overflow-x: auto;
}
</style>
</head>
<body>
<h1>🧪 匹配系统完整性测试</h1>
<div id="results"></div>

<script src="js/clubs-data.js"></script>
<script src="js/messages-data.js"></script>
<script src="js/user-data.js"></script>

<script>
const resultsDiv = document.getElementById('results');

function logTest(title, passed, details = '') {
  const div = document.createElement('div');
  div.className = `test-result ${passed ? 'pass' : 'fail'}`;
  div.innerHTML = `<strong>${passed ? '✅' : '❌'} ${title}</strong>${details ? `<pre>${details}</pre>` : ''}`;
  resultsDiv.appendChild(div);
}

function logInfo(message) {
  const div = document.createElement('div');
  div.className = 'test-result info';
  div.innerHTML = `<strong>ℹ️ ${message}</strong>`;
  resultsDiv.appendChild(div);
}

// 测试1: 检查数据库
try {
  logTest('✓ CLUBS_DB加载成功', typeof CLUBS_DB !== 'undefined' && Object.keys(CLUBS_DB).length > 0,
    `社团数量: ${Object.keys(CLUBS_DB).length}`);
} catch(e) {
  logTest('✗ CLUBS_DB加载失败', false, e.message);
}

// 测试2: 检查所需俱乐部
const requiredClubs = ['drama', 'photo', 'coding', 'green'];
requiredClubs.forEach(clubId => {
  const club = CLUBS_DB[clubId];
  const hasRequired = club && club.name && club.emoji && club.cardBg;
  logTest(`社团 "${clubId}" 完整性`, hasRequired, 
    hasRequired ? `名称: ${club.name} | 表情: ${club.emoji}` : '缺少必需字段');
});

// 测试3: 检查USER_DATA系统
logTest('USER_DATA系统存在', typeof USER_DATA !== 'undefined', 
  `方法: ${Object.getOwnPropertyNames(USER_DATA).join(', ')}`);

// 测试4: 检查USER_DATA中的新字段
logTest('USER_DATA.matchAnswers存在', USER_DATA && typeof USER_DATA.matchAnswers !== 'undefined',
  `初始值: ${JSON.stringify(USER_DATA.matchAnswers)}`);

logTest('USER_DATA.matchResult存在', USER_DATA && typeof USER_DATA.matchResult !== 'undefined',
  `初始值: ${JSON.stringify(USER_DATA.matchResult)}`);

// 测试5: 检查USER_DATA新方法
const newMethods = ['isMatchCompleted', 'saveMatchAnswers', 'saveMatchResult', 'clearMatchData'];
newMethods.forEach(method => {
  logTest(`USER_DATA.${method}() 存在`, USER_DATA && typeof USER_DATA[method] === 'function');
});

// 测试6: 测试匹配算法逻辑（模拟）
logInfo('测试匹配算法逻辑...');
const testAnswers = {
  q1: '艺术与创意',
  q2: ['朋友交流', '参加比赛'],
  q3: '灵活参加',
  q4: '零基础',
  customAnswers: {}
};

logTest('模拟答案对象有效', testAnswers && testAnswers.q1,
  `Q1: ${testAnswers.q1} | Q2: ${testAnswers.q2.join(', ')}`);

// 测试7: 检查calculateMatchScore函数（如果在HTML中定义）
if(typeof calculateMatchScore === 'function') {
  try {
    const result = calculateMatchScore(testAnswers);
    logTest('calculateMatchScore() 执行成功', result && result.clubs && result.clubs.length > 0,
      `返回${result.clubs.length}个推荐\n${JSON.stringify(result.clubs.slice(0,1), null, 2)}`);
  } catch(e) {
    logTest('calculateMatchScore() 执行失败', false, e.message);
  }
} else {
  logInfo('calculateMatchScore() 需要在主HTML中定义（通常在clubmatch-full.html中）');
}

// 测试8: 检查USER_DATA localStorage持久化
try {
  USER_DATA.matchAnswers = { test: 'value' };
  USER_DATA.save();
  const stored = localStorage.getItem('USER_DATA');
  logTest('localStorage持久化', stored && JSON.parse(stored).matchAnswers,
    '数据成功保存到localStorage');
  // 清空测试数据
  USER_DATA.matchAnswers = {};
  USER_DATA.save();
} catch(e) {
  logTest('localStorage测试失败', false, e.message);
}

// 最终总结
logInfo('✨ 匹配系统核心组件检查完成！主要功能已就位准备在主应用中测试。');
</script>
</body>
</html>
